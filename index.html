<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>資金繰りメーター</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <p class="eyebrow">MONEY SNAPSHOT</p>
      <h1>資金繰りメーター</h1>
      <p class="sub">数字を入れるだけで、支払い後残高と危険度を確認。</p>
    </header>

    <section class="card summary-card">
      <div>
        <span class="label">支払い後残高</span>
        <strong id="remaining" class="hero-number">¥0</strong>
      </div>
      <div id="statusBadge" class="status-badge">未入力</div>
      <p id="advice" class="advice">資産と支払いを入力してください。</p>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>現在資産</h2>
        <span id="assetTotal" class="mini-total">¥0</span>
      </div>
      <div class="grid two">
        <label>個人口座<input id="personal" inputmode="numeric" type="number" min="0" value="680000"></label>
        <label>バンド口座<input id="band" inputmode="numeric" type="number" min="0" value="420000"></label>
        <label>金庫<input id="cash" inputmode="numeric" type="number" min="0" value="100000"></label>
        <label>FCプール<input id="fc" inputmode="numeric" type="number" min="0" value="130000"></label>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>入金予定</h2>
        <span id="incomeTotal" class="mini-total">¥0</span>
      </div>
      <div id="incomeRows" class="rows"></div>
      <button class="secondary" id="addIncome">＋ 入金を追加</button>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>支払い予定</h2>
        <span id="paymentTotal" class="mini-total">¥0</span>
      </div>
      <div id="paymentRows" class="rows"></div>
      <button class="secondary" id="addPayment">＋ 支払いを追加</button>
    </section>

    <section class="card simulator">
      <h2>分割シミュレーション</h2>
      <p>今月から未来へ逃がす金額を入力。</p>
      <label>今月の支払い減額<input id="deferred" inputmode="numeric" type="number" min="0" value="0"></label>
      <div class="sim-result">
        <span>減額後の残高</span>
        <strong id="simRemaining">¥0</strong>
      </div>
    </section>

    <section class="card breakdown">
      <h2>内訳</h2>
      <div><span>総資産</span><strong id="grandAssets">¥0</strong></div>
      <div><span>入金予定</span><strong id="grandIncome">¥0</strong></div>
      <div><span>支払い予定</span><strong id="grandPayments">¥0</strong></div>
    </section>

    <div class="actions">
      <button id="resetBtn" class="ghost">初期化</button>
      <button id="saveBtn" class="primary">保存</button>
    </div>

    <p class="footnote">端末内に保存されます。銀行口座とは連携しません。</p>
  </main>

  <template id="rowTemplate">
    <div class="entry-row">
      <input class="name" type="text" placeholder="項目名">
      <input class="date" type="date">
      <input class="amount" inputmode="numeric" type="number" min="0" placeholder="金額">
      <button class="delete" aria-label="削除">×</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
